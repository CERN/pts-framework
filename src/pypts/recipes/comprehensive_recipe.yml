name: Comprehensive Example Test recipe
version: 0.1.0
recipe_version: 1.0.0
description: A sample recipe demonstrating many different combinations of input/outputs.
main_sequence: Comprehensive_IO_Types
test_package: pypts
globals:
  #continue_on_error: False #Overall continue_on_error. If it exists, then it will overwrite specific step specifications for continue_on_error
  global_value: 45
  loadFile_key: 'file'
  cancel_key: 'cancel' #key used for buttons that wishes to stop steps.
  ID_key: 'ID' #If used as a step name, a gui will appear that helps set up a uart connection.
  wrt_key: 'wrt' #writes the given input directly to the specified variable.
  ssh_client: None
  host:  #Host name, can either be name or IP
  user: root #username of ssh
  password:  #password for ssh
  private_key: #private key for ssh
  port: None
---
sequence_name: Comprehensive_IO_Types
description: Sequence covering all input and output types
parameters: {}
locals:
  serial_ID: None
  serialport: None
  baudrate: None
  local_val: 10
  some_value: 5
  my_direct: 7
  passthrough_result: None
  equals_check: 5
  result_check: None
  range_result: None
  value_global: None
  value_local: None
  input_from_global: None
  input_from_local: None
  hwmon_measured:
outputs:
  final_result: None
setup_steps: 

#Creates a threading holding the opened SSH connection so it can be called and used elsewhere. 
- steptype: SSHConnectStep
  step_name: Find the SSH client connection
  description: Asking user to find the file needed
  continue_on_error: false
  skip: true


steps:

# === sleeptest ===

- steptype: WaitStep
  step_name: Wait for 10s
  description: Waiting 10 seconds to let user check confirm
  skip: false
  input_mapping:
    wait_time:
      value: '3'

  # === INPUT: global | OUTPUT: passfail ===
  #Runs a method that sends commands to ssh.
- steptype: PythonModuleStep
  step_name: Global client write file
  description: Using global client to write a file to ssh connection.
  action_type: method
  module: example_tests.py
  method_name: write_a_simple_filessh
  input_mapping:
    target:
      type: global
      global_name: ssh_client
  output_mapping:
    output:
      type: passfail
  continue_on_error: true
  skip: true

#Reads the hwmon class on ssh recipient.
- steptype: PythonModuleStep
  step_name: Global client read hwmon
  description: Using global client to read the hwmon on PCB
  action_type: method
  module: example_tests.py
  method_name: get_hwmon
  input_mapping:
    target:
      type: global
      global_name: ssh_client
  output_mapping:
    output:
      type: local
      local_name: hwmon_measured
  continue_on_error: true
  skip: true

- steptype: UserLoadingStep
  step_name: Load config file
  description: Asking user to find the file needed
  input_mapping:
    message:
      type: direct
      value: 'Find the specified file'
    image_path: 
      type: direct
      value: lego2.jpg
    options:
      type: direct
      value:
      - cancel: 'cancel'
      - file: 'next'
  output_mapping:
    output:
      type: passfail
  file_save_location: 
    type: global
    variable: file
  continue_on_error: True

- steptype: UserRunMethodStep
  step_name: Running the specified method
  description: Runs the specified method
  action_type: method
  module: example_tests.py
  input_mapping:
    message:
      type: direct
      value: 'Find the specified file'
    options:
      type: direct
      value:
      - cancel: 'cancel'
      - run: 'Run'
    image_path: 
      type: direct
      value: lego2.jpg
    method_name:
      type: method
      value: 'is_PSU_disconnected'
  output_mapping:
    output:
      type: passfail
  trigger_response: "run"
  continue_on_error: True


- steptype: UserRunMethodStep
  step_name: Running the specified method
  description: Asking user to find the file needed
  action_type: method
  module: example_tests.py
  input_mapping:
    message:
      type: direct
      value: 'Find the specified file'
    options:
      type: direct
      value:
      - cancel: 'cancel'
      - run: 'Run'
    image_path: 
      type: direct
      value: lego2.jpg
    method_name:
      type: method
      value: 'loadconfigFile'
    method_input:
      type: global
      global_name: file
  output_mapping:
    output:
      type: passfail
  trigger_response: "run"
  continue_on_error: True

- steptype: UserWriteStep
  step_name: Writing a command 
  description: Write the ID or the port 
  input_mapping:
    message:
      type: direct
      value: 'Write the ID or serial port of device'
    image_path: 
      type: direct
      value: lego2.jpg
    options:
      type: direct
      value:
      - 'cancel': 'cancel'
      - 'ID': 'Write'
  output_mapping:
    output:
      type: passfail

- steptype: UserWriteStep
  step_name: Writing a command 
  description: Write to a specified variable in local or global.  
  input_mapping:
    message:
      type: direct
      value: 'Write the ID or serial port of device'
    image_path: 
      type: direct
      value: lego2.jpg
    options:
      type: direct
      value:
      - 'cancel': 'cancel'
      - 'wrt': 'Write'
  output_mapping:
    output:
      type: local
      local_name: my_direct

#step running through the ssh 
- steptype: UserInteractionStep
  step_name: Initial Buttonpush
  description: Asking user for confirmation before test starts.
  skip: false
  input_mapping:
    message:
      type: direct
      value: ['Connect devices', 'click to verify connection to the devices', 'load configuration file', 'click to read value to confirm connection']
      indexed: true
    image_path: 
      type: direct
      value: lego2.jpg
    options:
      type: direct
      value:
      - 'finish': 'cancel'
      - 'next': 'next'
  output_mapping:
    output:
      type: equals
      value: 'next'
  trigger_response: "next"
  continue_on_error: True

- steptype: UserInteractionStep
  step_name: Yes no window without image
  description: Asking user for confirmation before test starts.
  skip: false
  input_mapping:
    message:
      type: direct
      value: 'We test with normal buttons without image.
        '
    options:
      type: direct
      value:
      - 'yes': ''
      - 'no': ''
  output_mapping:
    output:
      type: equals
      value: 'yes'
  continue_on_error: True

# === INPUT: direct | OUTPUT: passthrough ===
- steptype: PythonModuleStep
  step_name: Direct Input - Passthrough Output
  description: Using direct input and passthrough output
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: direct
      value: 5
  output_mapping:
    output:
      type: passthrough

# === INPUT: direct | OUTPUT: passfail ===
- steptype: PythonModuleStep
  step_name: Direct Input - PassFail Output
  description: Direct input to produce a pass/fail
  action_type: method
  module: example_tests.py
  method_name: test_to_run
  input_mapping:
    target:
      type: direct
      value: 45
  output_mapping:
    compare:
      type: passfail

# === INPUT: direct | OUTPUT: equals ===
- steptype: PythonModuleStep
  step_name: Direct Input - Equals Output
  description: Direct input and check equality
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: direct
      value: 4
  output_mapping:
    output:
      type: equals
      value: 5

# === INPUT: direct | OUTPUT: range ===
- steptype: PythonModuleStep
  step_name: Direct Input - Range Output
  description: Direct input and check range
  action_type: method
  module: example_tests.py
  method_name: range_test
  input_mapping:
    value:
      type: direct
      value: 15
    min:
      type: direct
      value: 10
    max:
      type: direct
      value: 20
  output_mapping:
    compare:
      type: range
      min: '10'
      max: '20'

# === INPUT: direct | OUTPUT: global ===
- steptype: PythonModuleStep
  step_name: Direct Input - Global Output
  description: Store output to global
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: direct
      value: 45
  output_mapping:
    output:
      type: global
      global_name: value_global

# === INPUT: direct | OUTPUT: local ===
- steptype: PythonModuleStep
  step_name: Direct Input - Local Output
  description: Store output to local
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: direct
      value: 2
  output_mapping:
    output:
      type: local
      local_name: value_local

# === INPUT: local | OUTPUT: passthrough ===
- steptype: PythonModuleStep
  step_name: Local Input - Passthrough Output
  description: Local input and passthrough output
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: local
      local_name: some_value
  output_mapping:
    output:
      type: passthrough

# === INPUT: global | OUTPUT: passfail ===
- steptype: PythonModuleStep
  step_name: Global Input - PassFail Output
  description: Using global input with pass/fail output
  action_type: method
  module: example_tests.py
  method_name: test_to_run
  input_mapping:
    target:
      type: global
      global_name: global_value
  output_mapping:
    compare:
      type: passfail

# === INPUT: local | OUTPUT: equals ===
- steptype: PythonModuleStep
  step_name: Local Input - Equals Output
  description: Local input and equals output
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: local
      local_name: equals_check
  output_mapping:
    output:
      type: equals
      value: 6

# === INPUT: global | OUTPUT: range ===
- steptype: PythonModuleStep
  step_name: Global Input - Range Output
  description: Use global inputs and return range-checked value
  action_type: method
  module: example_tests.py
  method_name: range_test
  input_mapping:
    value:
      type: global
      global_name: global_value
    min:
      type: direct
      value: 40
    max:
      type: direct
      value: 50
  output_mapping:
    compare:
      type: range
      min: '40'
      max: '50'

# === INPUT: local | OUTPUT: global ===
- steptype: PythonModuleStep
  step_name: Local Input - Output to Global
  description: Local input with output stored globally
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: local
      local_name: some_value
  output_mapping:
    output:
      type: global
      global_name: result_check

# === INPUT: global | OUTPUT: local ===
- steptype: PythonModuleStep
  step_name: Global Input - Output to Local
  description: Global input and local output
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: global
      global_name: global_value
  output_mapping:
    output:
      type: local
      local_name: final_result
- steptype: WaitStep
  step_name: Wait for 3s
  description: Waiting 3 seconds to let user check confirm
  skip: false
  input_mapping:
    wait_time:
      value: '3'
  output_mapping: {}

teardown_steps:

- steptype: SSHCloseStep
  step_name: Closes the SSH client
