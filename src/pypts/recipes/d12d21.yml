name: Template Test Recipe
version: 0.0.1
recipe_version: 1.0.0
description: A Template Recipe
main_sequence: Template Sequence
globals: {}
---
sequence_name: Template Sequence
description: Template Sequence Description
parameters: {}
locals: {}
outputs: {}
setup_steps: []
steps:
- steptype: UserInteractionStep
  step_name: Template Step Name
  description: Template Step Description
  skip: 'False'
  input_mapping:
    message:
      type: direct
      value: Put your message here
    options:
      type: direct
      value:
      - 'yes': ''
      - 'no': ''
  output_mapping:
    output:
      type: equals
      value: 'yes'
- steptype: PythonModuleStep
  step_name: Run a other_test
  action_type: method
  module: src/pypts/example_tests.py
  method_name: other_test
  input_mapping: ''
  output_mapping:
    some_return:
      type: passfail
    value:
      type: local
      local_name: test_value
teardown_steps: []
