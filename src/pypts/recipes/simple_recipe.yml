name: Example Test Recipe
version: 0.1.0
recipe_version: 1.0.0
description: A sample recipe demonstrating how to call functions from example_tests.py
main_sequence: Main
continue_on_error: true
globals: {}
---
sequence_name: Main
description: The main sequence of steps for the example recipe.
parameters:
  target_value: '0'
locals:
  target_value: '45'
  test_name: Hello
  wonderful: None
  wunderbar: None
outputs:
  my_output: None
setup_steps: []
steps:
- steptype: UserInteractionStep
  step_name: Are you all right?
  description: Asking user for confirmation
  skip: false
  input_mapping:
    message:
      type: direct
      value: 'Hello there. Are you doing all right?

        Please let us know by pressing the correct button :)

        '
    image_path:
      type: direct
      value: lego2.jpg
    options:
      type: direct
      value:
      - 'yes': ''
      - 'no': ''
  output_mapping:
    output:
      type: equals
      value: 'yes'

# === INPUT: direct | OUTPUT: equals ===
- steptype: PythonModuleStep
  step_name: Direct Input - Equals Output
  description: Direct input and check equality
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: direct
      value: 4
  output_mapping:
    output:
      type: equals
      value: 5


- steptype: PythonModuleStep
  step_name: other_test
  description: Python existing method - expect pass
  action_type: method
  module: example_tests
  method_name: other_test
  input_mapping: {}
  output_mapping:
    some_return:
      type: passfail
    value:
      type: local
      local_name: some_value

- steptype: PythonModuleStep
  step_name: other_test
  description: Python existing method - expect pass
  action_type: method
  module: example_tests
  method_name: other_test
  input_mapping: {}
  output_mapping:
    value:
      type: equals
      value: 3
- steptype: PythonModuleStep
  step_name: other_testa
  description: Python non-existing method - expect error
  action_type: method
  module: example_tests
  method_name: other_test
  input_mapping: {}
  output_mapping:
    some_return:
      type: passfail
    value:
      type: local
      local_name: test_value
- steptype: PythonModuleStep
  step_name: simple_output
  description: Python method, while providing non-existing inputs - expect error
  action_type: method
  module: example_tests.py
  method_name: simple_output
  input_mapping:
    value:
      type: local
      local_name: test_value
  output_mapping:
    output:
      type: local
      local_name: calculated_output
- steptype: PythonModuleStep
  step_name: test_to_run (Check value 45)
  description: Python existing method - invalid range
  action_type: method
  module: example_tests.py
  method_name: test_to_run
  input_mapping:
    target:
      type: direct
      value: 45
  output_mapping:
    compare:
      type: passfail
    other_output:
      type: local
      local_name: some_string
- steptype: PythonModuleStep
  step_name: range_test (valid Range)
  description: Python existing method - invalid range
  action_type: method
  module: example_tests.py
  method_name: range_test
  input_mapping:
    value:
      type: direct
      value: '15'
    min:
      type: direct
      value: '10'
    max:
      type: direct
      value: '20'
  output_mapping:
    compare:
      type: range
      min: '10'
      max: '20'
- steptype: WaitStep
  step_name: Wait for 3s
  description: (Skip) Waiting 3 seconds to let user check confirm
  skip: true
  input_mapping:
    wait_time:
      value: '3'
  output_mapping: {}
- steptype: PythonModuleStep
  step_name: Run range_test (outside Range)
  description: Some description
  action_type: method
  module: example_tests.py
  method_name: range_test
  input_mapping:
    value:
      type: direct
      value: '25'
    min:
      type: direct
      value: '10'
    max:
      type: direct
      value: '20'
  output_mapping:
    compare:
      type: range
      min: '10'
      max: '20'
- steptype: PythonModuleStep
  step_name: Generate Error Deliberately
  description: Some description
  action_type: method
  module: example_tests.py
  method_name: generate_error
  input_mapping: {}
  output_mapping: {}
teardown_steps: []
