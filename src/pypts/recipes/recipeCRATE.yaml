---
name: DIOT Crate PTS
version: 0.0.1
description: This is the test recipe for the DIOT Crate
main_sequence: Main
globals: {}

---
sequence_name: Main
description: 
setup_steps: []
steps:
- steptype: PythonModuleStep
  step_name: Wait for system
  skip: false
  action_type: method
  module: tests/test_14WR_clocks.py
  method_name: wait
  input_mapping:
    wait_time: {type: direct, value: 1, indexed: false}
  output_mapping: {}
- steptype: PythonModuleStep
  step_name: Test backplane EEPROMs
  action_type: method
  module: tests/test_1EEPROMS.py
  method_name: test_bck_EEPROMs
  input_mapping:
    slot_number: {type: direct, value: ["421", "422", "423", "424", "425", "426", "427", "428"], indexed: true}
  output_mapping:
    result: {type: passfail}
- steptype: PythonModuleStep
  step_name: SYSEN Connected
  action_type: method
  module: tests/test_2SYSEN_Connected.py
  method_name: test_SYSEN_Connected
  input_mapping:
    whatever: {type: direct, value: 1, indexed: false}
  output_mapping:
    connected: {type: passfail}
- steptype: PythonModuleStep
  step_name: i2c bus
  action_type: method
  module: tests/test_3i2c_BUS.py
  method_name: test_i2c_BUS
  input_mapping:
    device: {type: direct, value: ['hartmann-psu', 'tc74'], indexed: true}
    expected: {type: direct, value: [2, 1], indexed: true}
  output_mapping:
    result: {type: passfail}
- steptype: PythonModuleStep
  step_name: HiSpeed Tranceivers
  action_type: method
  module: tests/test_4HiSpeed_Transceivers.py
  method_name: test_Aurora
  skip: false
  input_mapping:
    devname: {type: direct, value: ["bck_link1",
        "bck_link2",
        "bck_link3",
        "bck_link4",
        "bck_link5",
        "bck_link6",
        "bck_link7",
        "bck_link8"], indexed: true}
  output_mapping:
    result: {type: passfail}
- steptype: PythonModuleStep
  step_name: Are power supplies present?
  action_type: method
  module: tests/test_5PRES_Power_Supplies.py
  method_name: test_PRES
  skip: false
  input_mapping:
    gpio_number: {type: direct, value: [419, 420], indexed: true}
  output_mapping:
    result: {type: passfail}
- steptype: PythonModuleStep
  step_name: Test GPIO
  action_type: method
  module: tests/test_7GPIO.py
  method_name: test_GPIO
  skip: false
  input_mapping:
    whatever: {type: direct, value: 0, indexed: false}
  output_mapping:
    result: {type: equals, value: 0}
- steptype: PythonModuleStep
  step_name: Test LVDS backplane
  action_type: method
  module: tests/test_8Backplane_LVDS.py
  method_name: test_LVDS_backplane
  skip: false
  input_mapping:
    whatever: {type: direct, value: 0, indexed: false}
  output_mapping:
    num_errors: {type: equals, value: 0}
- steptype: PythonModuleStep
  step_name: Test SI53312 backplane
  action_type: method
  module: tests/test_9Backplane_Clocks.py
  method_name: test_SI53312_backplane
  skip: false
  input_mapping:
    whatever: {type: direct, value: 0, indexed: false}
  output_mapping:
    result: {type: passfail}
- steptype: UserInteractionStep
  step_name: Fan tray LEDs
  skip: false
  input_mapping:
    message: {type: direct, value: "Do all the LED look like this?", indexed: false}
    image_path: {type: direct, value: tests/pics/Front_Panel_Test.jpg, indexed: false}
    options: {type: direct, value: [yes, no], indexed: false}
  output_mapping:
    output: {type: equals, value: "yes"}
- steptype: PythonModuleStep
  step_name: Test i2c Fan Tray
  action_type: method
  module: tests/test_10_11Fantray.py
  method_name: test_I2C_Fantray
  input_mapping:
    whatever: {type: direct, value: 0, indexed: false}
  output_mapping:
    result: {type: range, min: 10, max: 40}
- steptype: PythonModuleStep
  step_name: Power cycling the crate
  skip: false
  action_type: method
  module: tests/test_12Power_Cycle.py
  method_name: test_Power_Cycle
  input_mapping:
    whatever: {type: direct, value: 0, indexed: false}
  output_mapping:
    power_cycle_ok: {type: passfail}
- steptype: PythonModuleStep
  step_name: Wait for reboot
  skip: false
  action_type: method
  module: tests/test_14WR_clocks.py
  method_name: wait
  input_mapping:
    wait_time: {type: direct, value: 60, indexed: false}
  output_mapping: {}
- steptype: PythonModuleStep
  step_name: Read White Rabbit Clocks
  action_type: method
  module: tests/test_14WR_clocks.py
  method_name: read_WR_clocks
  input_mapping:
    whatever: {type: direct, value: 0, indexed: false}
  output_mapping:
    frequencies: {type: local, local_name: wr_clock_frequencies}
- steptype: PythonModuleStep
  step_name: Test White Rabbit Clocks
  action_type: method
  module: tests/test_14WR_clocks.py
  method_name: test_WR_clock
  input_mapping:
    clock_rate: {type: local, local_name: wr_clock_frequencies, indexed: true}
    target_rate: {type: direct, value: [25, 62.5, 62.5], indexed: true}
    tolerance: {type: direct, value: 0.01, indexed: false}
  output_mapping:
    result: {type: passfail}
teardown_steps: []
parameters: []
locals:
  wr_clock_frequencies: []
outputs: []


