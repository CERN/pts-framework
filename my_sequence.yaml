---
sequence_name: my sequence
version: 0.0.1
setup_steps: []
steps:
- steptype: PythonModuleStep
  step_name: Test C
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: test_to_run
  input_mapping:
    target: {type: parameter, parameter_name: target_value}
  output_mapping:
    compare: {type: passfail}
    other_output: {type: local, local_name: my_output}
- steptype: PythonModuleStep
  step_name: Test Da
  action_type: read_attribute
  module: C:\dev\pypts-test\test_dut.py
  attribute_name: some_value
  input_mapping: {}
  output_mapping:
    some_value: {type: local, local_name: first_value}
- steptype: PythonModuleStep
  step_name: Test Db
  action_type: write_attribute
  module: C:\dev\pypts-test\test_dut.py
  attribute_name: some_value
  input_mapping:
    some_value: {type: direct, value: 3}
  output_mapping: {}
- steptype: PythonModuleStep
  step_name: Test Dc
  action_type: read_attribute
  module: C:\dev\pypts-test\test_dut.py
  attribute_name: some_value
  input_mapping: {}
  output_mapping:
    some_value: {type: local, local_name: second_value}
- steptype: PythonModuleStep
  step_name: Test E
  action_type: method
  module: test_thing
  method_name: other_test
  input_mapping:
    value: {type: direct, value: 1}
  output_mapping:
    some_return: {type: output, output_name: my_output}
- steptype: SubSequenceStep
  step_name: Test F
  sequence_file: sub_sequence.yaml
  input_mapping:
    target_value: {type: local, local_name: target_value}
  output_mapping: {}
teardown_steps: []
parameters:
  target_value: 0
locals:
  target_value: 45
  test_name: Hello
  my_output:
  first_value:
  second_value:
outputs:
  my_output:
  