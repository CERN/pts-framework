---
sequence_name: Main
description: 
setup_steps: []
steps:
- steptype: PythonModuleStep
  step_name: Run test_to_run
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: test_to_run
  input_mapping:
    target: {type: local, local_name: target_value, indexed: false}
  output_mapping:
    compare: {type: passfail}
    other_output: {type: local, local_name: my_output}
- steptype: PythonModuleStep
  step_name: Test Da
  description:
  action_type: read_attribute
  module: C:\dev\pypts\test_dut.py
  attribute_name: some_value
  input_mapping: 
    attribute_name: {type: direct, value: some_value, indexed: false}
  output_mapping:
    some_value: {type: local, local_name: first_value}
- steptype: PythonModuleStep
  step_name: Test Db
  action_type: write_attribute
  module: C:\dev\pypts\test_dut.py
  attribute_name: some_value
  input_mapping:
    attribute_name: {type: direct, value: some_value, indexed: false}
    attribute_value: {type: direct, value: 3, indexed: false}
  output_mapping: {}
- steptype: PythonModuleStep
  step_name: Test Dc
  action_type: read_attribute
  module: C:\dev\pypts\test_dut.py
  attribute_name: some_value
  input_mapping:
    attribute_name: {type: direct, value: some_value, indexed: false}
  output_mapping:
    some_value: {type: equals, value: 3}
- steptype: UIMsgStep
  step_name: msg step
  input_mapping:
    message: {type: direct, value: Hello there, indexed: false}
  output_mapping: {}
- steptype: PythonModuleStep
  step_name: Test E
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: other_test
  input_mapping:
    value: {type: direct, value: 1, indexed: false}
  output_mapping:
    some_return: {type: output, output_name: my_output}
teardown_steps: []
parameters:
  - target_value
locals:
  target_value: 45
  test_name: Hello
  my_output:
  first_value:
  second_value:
outputs:
  - my_output
  
