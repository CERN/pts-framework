---
file_version: 0.0.1
name: MFE testing sequence
version: 0.0.1
description: This is the test recipe for the MFE board
main_sequence: Main
globals:
  some_global_variable: 38
tags:
  no_gui: steps that do not rely on GUI or user interaction
  ci: steps that are used in for continuous integration

---
sequence_name: Main
description: 
parameters:
  - target_value
locals:
  target_value: 45
  test_name: Hello
  my_output:
  first_value:
  hello: 
outputs:
  - my_output

setup_steps: []

steps:
- steptype: PythonModuleStep
  step_name: Run test_to_run function
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: test_to_run
  input_mapping:
    target: {type: local, local_name: target_value}
  output_mapping:
    compare: {type: passfail}
    other_output: {type: local, local_name: my_output}

- steptype: WaitStep
  step_name: Wait for 1s
  input_mapping:
    wait_time: {value: 1}
  output_mapping: {}

- steptype: PythonModuleStep
  step_name: Read an attribute from a file
  description:
  action_type: read_attribute
  module: C:\dev\pypts\test_dut.py
  input_mapping: 
    attribute_name: {type: direct, value: some_value}
  output_mapping:
    some_value: {type: local, local_name: first_value}

- steptype: PythonModuleStep
  step_name: Write attribute in python file
  action_type: write_attribute
  module: C:\dev\pypts\test_dut.py
  input_mapping:
    attribute_name: {value: some_value, indexed: false}
    attribute_value: {value: 3, indexed: false}
  output_mapping: {}

- steptype: PythonModuleStep
  step_name: Read attribute again to see that the previous write worked
  action_type: read_attribute
  module: C:\dev\pypts\test_dut.py
  input_mapping:
    attribute_name: {type: direct, value: some_value}
  output_mapping:
    some_value: {type: equals, value: 3}

- steptype: UserInteractionStep
  step_name: Send text and an image to the UI
  skip: true
  input_mapping:
    message: {type: direct, value: Hello there}
    image_path: {type: direct, value: images\lego2.jpg}
    options: {type: direct, value: ["yes", "no"]}
  output_mapping:
    output: {type: equals, value: "yes"}

- steptype: PythonModuleStep
  step_name: Testing non dictionary return value
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: simple_return
  input_mapping: {}
  output_mapping:
    output: {type: local, local_name: my_output}

- steptype: SubSequenceStep
  step_name: Testing a subsequence
  sequence: {type: internal, name: Subsequence}
  input_mapping:
    sublocal: {type: direct, value: 45}
  output_mapping:
    hello: {type: local, local_name: hello}
    seq_result: {type: passthrough}

- steptype: PythonModuleStep
  skip: true
  step_name: Generating an error
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: generate_error
  input_mapping: {}
  output_mapping: {}

- steptype: PythonModuleStep
  step_name: Generating another error
  skip: true
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: generate_error
  input_mapping: {}
  output_mapping: {}

teardown_steps: 
- steptype: PythonModuleStep
  step_name: Run other_test from python file
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: other_test
  input_mapping: {}
  output_mapping:
    some_return: {type: output, output_name: my_output}
  
---
sequence_name: Subsequence
description: 

parameters: # list of local variable names. These are the ones that the calling step can set before running the subsequence
  - sublocal

locals:
  sublocal: 34
  hello: bla
  bye: nope

outputs: [sublocal, hello]

setup_steps: []
steps:
- steptype: PythonModuleStep
  step_name: Run test_to_run function
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: test_to_run
  input_mapping:
    target: {type: local, local_name: sublocal}
  output_mapping:
    compare: {type: passfail}
    other_output: {type: local, local_name: hello}

teardown_steps: []
