---
file_version: 0.0.1
name: MFE testing sequence
version: 0.0.1
description: This is the test recipe for the MFE board
main_sequence: Main
globals:
  some_global_variable: 38
tags:
  no_gui: steps that do not rely on GUI or user interaction
  ci: steps that are used in for continuous integration

---
sequence_name: Main
description: 
parameters: []
locals:
  first_value: 0
outputs: []

setup_steps: []

steps:
- steptype: PythonModuleStep
  step_name: Run test_to_run function
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: test_to_run
  input_mapping:
    target: {type: direct, value: 45}
  output_mapping:
    compare: {type: passfail}

- steptype: WaitStep
  step_name: Wait for 0.5s
  input_mapping:
    wait_time: {value: 0.5}
  output_mapping: {}

- steptype: PythonModuleStep
  step_name: Read an attribute from a file
  description:
  action_type: read_attribute
  module: C:\dev\pypts\test_dut.py
  input_mapping: 
    attribute_name: {type: direct, value: some_value}
  output_mapping:
    some_value: {type: local, local_name: first_value}

teardown_steps: 
- steptype: PythonModuleStep
  step_name: Run other_test from python file
  action_type: method
  module: C:\dev\pypts\test_dut.py
  method_name: other_test
  input_mapping: {}
  output_mapping:
    some_return: {type: passfail}
  
---
sequence_name: Reliablity Test
description: 

parameters: [temperature, humidity]

locals:
  temperature: 0
  humidity: 0
  some_output: 3

outputs: [some_output]

setup_steps: []
steps:
- steptype: PythonModuleStep
  step_name: Wait for climactic chamber
  action_type: method
  module: C:\dev\pypts\clim_chamber.py
  method_name: wait_for_target
  input_mapping:
    temperature: {type: local, local_name: temperature}
    humidity: {type: local, local_name: humidity}
  output_mapping: {}

- steptype: SequenceStep
  step_name: Run quick test
  sequence: {type: internal, name: Main}
  input_mapping:
    temperature: {type: local, local_name: temperature}
    humidity: {type: local, local_name: humidity}
  output_mapping: {}
    #seq_result: {type: passthrough}

teardown_steps: []

---
sequence_name: Reliability Loop
description: 

parameters: []
locals:
  wonderful: -1
outputs: []

setup_steps:
- steptype: PythonModuleStep
  step_name: Prepare chamber
  action_type: method
  module: C:\dev\pypts\clim_chamber.py
  method_name: calculate_chamber_steps
  input_mapping:
    t_min: {value: 20}
    t_steps: {value: 2}
    t_step: {value: 2}
    rh_min: {value: 50}
    rh_steps: {value: 3}
    rh_step: {value: 5}
  output_mapping:
    temperatures: {type: local, local_name: temperatures}
    humidities: {type: local, local_name: humidities}

steps:
- steptype: SequenceStep
  step_name: Indexed step that will be repeated
  sequence: {type: internal, name: Reliablity Test}
  input_mapping:
    temperature: {type: local, local_name: temperatures, indexed: true}
    humidity: {type: local, local_name: humidities, indexed: true}
  output_mapping:
    some_output: {type: local, local_name: wonderful}

teardown_steps: []